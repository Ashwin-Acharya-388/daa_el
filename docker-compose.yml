version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: risk_analysis_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: risk_user
      POSTGRES_PASSWORD: risk_password_2024
      POSTGRES_DB: financial_risk
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U risk_user -d financial_risk"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: risk_analysis_cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
